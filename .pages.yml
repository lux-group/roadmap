media:
  input: public/images
  output: /roadmap/images

content:
  - name: teams
    label: Teams
    path: src/content/teams
    extension: md
    type: collection
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: product_group
        label: Product Group
        type: select
        required: true
        options:
          values:
            - "Commercial Platforms"
            - "Customer Service & Sales Experience"
            - "Data & Analytics"
            - "Distribution & Partnerships"
            - "Engineering Excellency & Infrastructure"
            - "Growth & Customer Lifecycle"
            - "Online CX"
            - "Supply"

      - name: hero_image
        label: Hero Image
        type: image

      - name: team_members
        label: Team Members
        type: object
        list:
          collapsible:
            summary: "{name}"
        fields:
          - name: name
            label: Name
            type: string
          - name: title
            label: Title
            type: string
          - name: photo
            label: Photo
            type: image
            options:
              path: team-members

      - name: gantt_items
        label: Roadmap Items
        type: object
        list:
          collapsible:
            summary: "{title}"
        fields:
          - name: title
            label: Title
            type: string
          - name: start_date
            label: Start Date
            type: date
            options:
              format: YYYY-MM-DD
          - name: end_date
            label: End Date
            type: date
            options:
              format: YYYY-MM-DD

      - name: goals
        label: Goals
        type: object
        list:
          collapsible:
            summary: "{headline}"
        fields:
          - name: headline
            label: Headline
            type: string
          - name: from_value
            label: From (current state)
            type: string
          - name: to_value
            label: To (target)
            type: string

      - name: key_initiatives
        label: Key Initiatives
        type: object
        list:
          collapsible:
            summary: "{heading}"
        fields:
          - name: heading
            label: Heading
            type: string
          - name: description
            label: Description
            type: text
